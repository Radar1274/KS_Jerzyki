<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KS Jerzyki - Rejestracja NFC</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1565c0">

<style>
body {
    font-family: Arial, Helvetica, sans-serif;
    background-color: #f4f6f9;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    margin: 0;
}

.container {
    text-align: center;
    background: white;
    padding: 40px;
    border-radius: 20px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.15);
    max-width: 500px;
    width: 90%;
}

.header {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 20px;
    margin-bottom: 30px;
}

.header img {
    width: 90px;
    height: 90px;
    object-fit: contain;
}

.header h1 {
    font-size: 28px;
    margin: 0;
}

#scan {
    width: 100%;
    padding: 28px;
    font-size: 32px;
    font-weight: bold;
    color: white;
    background-color: #1565c0;
    border: none;
    border-radius: 18px;
    cursor: pointer;
}

#scan:hover {
    background-color: #0d47a1;
}

#result {
    margin-top: 30px;
    padding: 25px;
    border: 2px dashed #bdbdbd;
    border-radius: 12px;
    font-size: 24px;
    min-height: 80px;
    background: #fafafa;
    line-height: 1.4;
}

.success {
    background: #e8f5e9 !important;
    border-color: #2e7d32 !important;
    color: #1b5e20;
}

.error {
    background: #ffebee !important;
    border-color: #c62828 !important;
    color: #b71c1c;
}

.warning {
    background: #fff8e1 !important;
    border-color: #f9a825 !important;
    color: #795548;
}
</style>
</head>

<body>

<div class="container">

    <div class="header">
        <img src="logo-ks-jerzyki.png" alt="Logo KS Jerzyki">
        <h1>KS Jerzyki</h1>
    </div>

    <button id="scan">SKANUJ KARTĘ</button>

    <div id="result">
        Oczekiwanie na przyłożenie karty NFC...
    </div>

</div>

<iframe id="sendFrame" name="sendFrame" style="display:none;"></iframe>

<script>

const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyVmEqJ0FEgL1XkkyxX1svs-iyxm06We69t8E5WZw8lLsM22Eq_XLNmyhTAihoxFVGf/exec";

function setResult(message, type = "") {
    const result = document.getElementById("result");
    result.className = "";

    if (type) {
        result.classList.add(type);
    }

    result.innerHTML = message;
}

function beep() {
    try {
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const oscillator = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();

        oscillator.connect(gainNode);
        gainNode.connect(audioCtx.destination);

        oscillator.frequency.value = 880;
        gainNode.gain.value = 0.1;

        oscillator.start();

        setTimeout(() => {
            oscillator.stop();
            audioCtx.close();
        }, 150);

    } catch (e) {}
}

function zapiszDoArkusza(kodNfc) {

    function zapiszDoArkusza(kodNfc) {

    const url = SCRIPT_URL +
        "?kodNfc=" + encodeURIComponent(kodNfc) +
        "&t=" + Date.now();

    beep();

    setResult(
        "✅ KARTA ODCZYTANA<br><br><strong>" +
        kodNfc +
        "</strong><br><br>Przekierowuję zapis do arkusza...",
        "success"
    );

    setTimeout(() => {
        window.location.href = url;
    }, 800);
}
    }

    try {

        const ndef = new NDEFReader();

        await ndef.scan();

        setResult(
            "Przyłóż kartę do telefonu...",
            "warning"
        );

        ndef.onreading = event => {

            const decoder = new TextDecoder();
            let odczyt = "";

            for (const record of event.message.records) {
                odczyt = decoder.decode(record.data).trim();
            }

            if (!odczyt) {

                setResult(
                    "❌ Nie udało się odczytać danych z karty.",
                    "error"
                );

                return;
            }

            zapiszDoArkusza(odczyt);
        };

    } catch (err) {

        setResult(
            "❌ Błąd skanowania:<br>" + err.message,
            "error"
        );
    }
});

</script>

</body>
</html>
