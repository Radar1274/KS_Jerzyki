<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>KS Jerzyki - Rejestracja obecności</title>

<style>
    body {
        font-family: Arial, Helvetica, sans-serif;
        background-color: #f4f6f9;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
    }

    .container {
        text-align: center;
        background: white;
        padding: 40px;
        border-radius: 20px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.15);
        max-width: 500px;
        width: 90%;
    }

    .header {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 20px;
        margin-bottom: 30px;
    }

    .header img {
        width: 90px;
        height: 90px;
        object-fit: contain;
    }

    .header h1 {
        font-size: 28px;
        margin: 0;
    }

    #scan {
        width: 100%;
        padding: 28px;
        font-size: 32px;
        font-weight: bold;
        color: white;
        background-color: #1565c0;
        border: none;
        border-radius: 18px;
        cursor: pointer;
        transition: 0.2s;
    }

    #scan:hover {
        background-color: #0d47a1;
        transform: scale(1.02);
    }

    #scan:active {
        transform: scale(0.98);
    }

    #result {
        margin-top: 30px;
        padding: 20px;
        border: 2px dashed #bdbdbd;
        border-radius: 12px;
        font-size: 22px;
        min-height: 40px;
        background: #fafafa;
    }
</style>
</head>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1565c0">
<body>

<div class="container">

    <div class="header">
        <!-- Podmień plik na własne logo -->
        <img src="logo-ks-jerzyki.png" alt="Logo KS Jerzyki">

        <h1>KS Jerzyki</h1>
    </div>

    <button id="scan">
        SKANUJ KARTĘ
    </button>

    <div id="result">
        Oczekiwanie na przyłożenie karty NFC...
    </div>

</div>

<script>
document.getElementById("scan").addEventListener("click", async () => {

    if (!("NDEFReader" in window)) {
        document.getElementById("result").textContent =
            "Ta przeglądarka lub urządzenie nie obsługuje NFC.";
        return;
    }

    try {

        const ndef = new NDEFReader();

        await ndef.scan();

        document.getElementById("result").textContent =
            "Przyłóż kartę do telefonu...";

        ndef.onreading = event => {

            const decoder = new TextDecoder();

            let odczyt = "";

            for (const record of event.message.records) {
                odczyt = decoder.decode(record.data);
            }

            document.getElementById("result").innerHTML =
                "<strong>Odczytano kartę:</strong><br>" + odczyt;

            // W tym miejscu można później wysłać dane do serwera lub Google Sheets.
        };

    } catch (err) {

        document.getElementById("result").textContent =
            "Błąd podczas skanowania: " + err.message;
    }

});
</script>

</body>
</html>
